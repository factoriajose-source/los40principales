    @media(max-width:900px){.hm{display:none;}}
    @media(max-width:600px){.hdr,.srcbar,.stats,.filt,.tw{padding-left:13px;padding-right:13px;}}

<script>
// ════════════════════════════════════════════════════════════
// LOS 40 PRINCIPALES — v6  Yahoo Finance (sin API key)
// ════════════════════════════════════════════════════════════
const STOCKS = [
  {t:'NVDA',n:'Nvidia',              s:'S'},{t:'AMD', n:'AMD',              s:'S'},
  {t:'AVGO',n:'Broadcom',            s:'S'},{t:'MU',  n:'Micron Technology', s:'S'},
  {t:'SNDK',n:'SanDisk',             s:'S'},{t:'TSM', n:'TSMC',              s:'S'},
  {t:'ARM', n:'Arm Holdings',        s:'S'},{t:'AMAT',n:'Applied Materials', s:'S'},
  {t:'LRCX',n:'Lam Research',        s:'S'},{t:'KLAC',n:'KLA Corp',          s:'S'},
  {t:'MRVL',n:'Marvell Technology',  s:'S'},
  {t:'MSFT',n:'Microsoft',           s:'I'},{t:'GOOGL',n:'Alphabet',         s:'I'},
  {t:'META',n:'Meta',                s:'I'},{t:'ORCL', n:'Oracle',            s:'I'},
  {t:'PLTR',n:'Palantir',            s:'I'},{t:'SNOW', n:'Snowflake',         s:'I'},
  {t:'DDOG',n:'Datadog',             s:'I'},{t:'NOW',  n:'ServiceNow',        s:'I'},
  {t:'AMZN',n:'Amazon',              s:'C'},{t:'CRWD',n:'CrowdStrike',       s:'C'},
  {t:'NET', n:'Cloudflare',          s:'C'},{t:'ZS',  n:'Zscaler',           s:'C'},
  {t:'PANW',n:'Palo Alto Networks',  s:'C'},{t:'ALAB',n:'Astera Labs',       s:'C'},
  {t:'SMCI',n:'Super Micro Computer',s:'N'},{t:'WDC', n:'Western Digital',   s:'N'},
  {t:'STX', n:'Seagate',             s:'N'},{t:'PURE',n:'Pure Storage',      s:'N'},
  {t:'DELL',n:'Dell Technologies',   s:'N'},
  {t:'TSLA',n:'Tesla',               s:'R'},{t:'RKLB',n:'Rocket Lab',        s:'R'},
  {t:'AXON',n:'Axon Enterprise',     s:'R'},{t:'PATH',n:'UiPath',            s:'R'},
  {t:'IONQ',n:'IonQ',                s:'R'},
  {t:'COIN',n:'Coinbase',            s:'F'},{t:'MELI',n:'MercadoLibre',      s:'F'},
  {t:'SHOP',n:'Shopify',             s:'F'},{t:'FTNT',n:'Fortinet',          s:'F'},
  {t:'UBER',n:'Uber Technologies',   s:'F'},
];
const SN={S:'Semis',I:'IA',C:'Cloud',N:'Infra',R:'Robótica',F:'Fintech'};

// ── Cache ──────────────────────────────────────────────────
const TTL_Q = 20*60*1000;   // cotización: 20 min
const TTL_H = 6*60*60*1000; // histórico:  6 horas
function cG(k){try{return JSON.parse(localStorage.getItem(k))?.d??null;}catch{return null;}}
function cS(k,d,ttl){try{localStorage.setItem(k,JSON.stringify({ts:Date.now(),ttl,d}));}catch{}}
function cOk(k,ttl){try{const r=JSON.parse(localStorage.getItem(k));return r&&(Date.now()-r.ts)<ttl;}catch{return false;}}
function cAll(){STOCKS.forEach(x=>{localStorage.removeItem('yq_'+x.t);localStorage.removeItem('yh_'+x.t);});}

// ── CORS Proxies (se rotan si uno falla) ──────────────────
const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
let proxyIdx=0;

async function yFetch(url){
  // Intenta los 4 proxies en orden, empieza por el que funcionó la última vez
  for(let i=0;i<PROXIES.length;i++){
    const pi=(proxyIdx+i)%PROXIES.length;
    try{
      const r=await fetch(PROXIES[pi](url),{signal:AbortSignal.timeout(9000)});
      if(!r.ok) continue;
      let j=await r.json();
      if(j.contents) j=JSON.parse(j.contents); // allorigins wrapper
      if(j?.chart?.result){
        proxyIdx=pi; // guardar el que funcionó
        document.getElementById('proxy-st').textContent=`· Proxy ${pi+1} activo`;
        return j;
      }
    }catch{continue;}
  }
  return null;
}

// ── Fetch datos de una acción (precio + histórico 1 año) ──
async function fetchStock(ticker){
  const qk='yq_'+ticker, hk='yh_'+ticker;
  const qOk=cOk(qk,TTL_Q), hOk=cOk(hk,TTL_H);
  if(qOk&&hOk) return {...(cG(qk)||{}), ...(cG(hk)||{})};

  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1y`;
  const j=await yFetch(url);
  if(!j) return {...(cG(qk)||{}), ...(cG(hk)||{})};

  const chart=j?.chart?.result?.[0];
  if(!chart) return {};
  const meta=chart.meta||{};
  const ts=chart.timestamp||[];
  const px=chart.indicators?.quote?.[0]?.close||[];

  // Array de entradas válidas ordenadas del más antiguo al más reciente
  const en=ts.map((t,i)=>({t,p:px[i]})).filter(e=>e.p!=null&&e.p>0);
  if(en.length<5) return {};

  const last=en.length-1;
  // Precio actual: usar meta (más preciso en intradía), sino último cierre
  const price=meta.regularMarketPrice||en[last].p;
  const pct=(old)=>old?((price-old)/old*100):null;

  // ── Cotización (caché corta) ──
  // CORRECCIÓN DÍA: usar meta.previousClose (cierre real de ayer, no del array)
  // meta.previousClose = ayer exacto
  // meta.chartPreviousClose = hace 1 año (NO usar para día)
  const prevClose = meta.previousClose || en[Math.max(0,last-1)].p;
  const dailyChg = (prevClose && prevClose > 0 && price !== prevClose)
    ? (price - prevClose) / prevClose * 100
    : null;

  const vol=meta.regularMarketVolume||null;
  const avgVol=meta.fiftyDayAverageVolume||null;

  // Validación: precio mínimo razonable para evitar datos erróneos de Yahoo
  if(!price || price < 0.5) return cG(qk)||{};

  const qData={price, d:dailyChg, vol, avgVol};
  cS(qk, qData, TTL_Q);

  // ── Histórico (caché larga) ──
  // CORRECCIÓN: usar días NATURALES por timestamp (igual que Investing.com)
  // Así los festivos (ej: 4 julio) no desplazan la referencia
  const weekAgo  = Date.now()/1000 - 7*24*3600;
  const monthAgo = Date.now()/1000 - 30*24*3600;
  const nearest  = (target) => en.reduce((b,e)=>
    Math.abs(e.t-target)<Math.abs(b.t-target)?e:b, en[0]);
  const w = pct(nearest(weekAgo).p);   // semana: 7 días naturales
  const m = pct(nearest(monthAgo).p);  // mes:    30 días naturales
  // YTD: primera sesión del año actual
  const yrStart=new Date(new Date().getFullYear(),0,1).getTime()/1000;
  const ytdEntry=en.find(e=>e.t>=yrStart);
  const ytd=ytdEntry?pct(ytdEntry.p):null;
  // CORRECCIÓN 1 AÑO: buscar timestamp más cercano a hace exactamente 365 días
  const oneYearAgo = Date.now()/1000 - 365*24*3600;
  const yrEntry = en.reduce((best,e)=>
    Math.abs(e.t-oneYearAgo)<Math.abs(best.t-oneYearAgo)?e:best, en[0]);
  const yr = pct(yrEntry.p);
  const hData={w,m,ytd,yr};
  cS(hk, hData, TTL_H);

  return {...qData,...hData};
}

// ── Score (0-100) ─────────────────────────────────────────
function score(st){
  const n=(v,lo,hi)=>v==null?0:Math.max(0,Math.min(100,(v-lo)/(hi-lo)*100));
  return Math.round(
    n(st.d,  -5, 12)*0.20+n(st.w,-10,25)*0.20+n(st.m,-20,60)*0.20+
    n(st.ytd,-30,200)*0.20+n(st.yr,-30,300)*0.15+
    n(st.vol&&st.avgVol?st.vol/st.avgVol:1,0.5,3)*0.05);
}
const emj=sc=>sc>=85?'🔥':sc>=70?'🚀':sc>=55?'📈':sc>=40?'➡️':'❄️';
const scl=sc=>sc>=85?'#f0c040':sc>=70?'#22c55e':sc>=55?'#38bdf8':sc>=40?'#94a3b8':'#475569';

// ── Formato ───────────────────────────────────────────────
const f2=v=>v!=null?v.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const fp=v=>v!=null?(v>=0?'+':'')+f2(v)+'%':'—';
const fx=v=>v!=null?'$'+v.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const cc=v=>v==null?'neu':v>0?'pos':'neg';
const sk=w=>`<span class="sk" style="width:${w}px">&nbsp;</span>`;

// ── Estado ────────────────────────────────────────────────
let data={},col='sc',dir=-1,filt='T';

// ── Render ────────────────────────────────────────────────
function render(){
  let rows=STOCKS.map(x=>{const d=data[x.t]||{};return{...x,...d,sc:score(d)};});
  if(filt!=='T') rows=rows.filter(r=>r.s===filt);
  rows.sort((a,b)=>col==='t'?a.t<b.t?-dir:dir:((a[col]??-9999)-(b[col]??-9999))*dir);
  document.getElementById('tb').innerHTML=rows.map((r,i)=>{
    const cl=scl(r.sc);
    return`<tr class="${r.sc>=70?'ex':''}">
      <td class="rk">${i+1}</td>
      <td><div class="tk ${r.sc>=85?'gl':''}">${r.t}</div></td>
      <td><div class="cn">${r.n}</div></td>
      <td class="hm"><span class="bg s${r.s}">${SN[r.s]}</span></td>
      <td class="pr">${r.price!=null?fx(r.price):sk(58)}</td>
      <td class="ch ${cc(r.d)}">${r.d!=null?fp(r.d):sk(46)}</td>
      <td class="ch ${cc(r.w)} hm">${r.w!=null?fp(r.w):sk(46)}</td>
      <td class="ch ${cc(r.m)} hm">${r.m!=null?fp(r.m):sk(46)}</td>
      <td class="ch ${cc(r.ytd)}">${r.ytd!=null?fp(r.ytd):sk(46)}</td>
      <td class="ch ${cc(r.yr)} hm">${r.yr!=null?fp(r.yr):sk(46)}</td>
      <td><div class="scw">
        <span style="font-size:13px">${emj(r.sc)}</span>
        <div class="scb"><div class="scf" style="width:${r.sc}%;background:${cl}"></div></div>
        <span class="scn" style="color:${cl}">${r.sc}</span>
      </div></td>
    </tr>`;
  }).join('');
  const hp=rows.filter(r=>r.price!=null);
  const top=[...rows].sort((a,b)=>(b.ytd??-999)-(a.ytd??-999))[0];
  document.getElementById('stats').innerHTML=`
    <div class="stat"><span class="slb">Hoy:</span><span class="svl cg">▲${hp.filter(r=>(r.d??0)>0).length} subiendo</span></div>
    <div class="stat"><span class="svl cr">▼${hp.filter(r=>(r.d??0)<0).length} bajando</span></div>
    <div class="stat"><span class="slb">💥:</span><span class="svl cy">${rows.filter(r=>r.sc>=70).length} explosivas</span></div>
    ${top?.ytd!=null?`<div class="stat hm"><span class="slb">👑 Mejor YTD:</span><span class="svl cg">${top.t} ${fp(top.ytd)}</span></div>`:''}`;
}

function srt(c){dir=col===c?dir*-1:-1;col=c;document.querySelectorAll('thead th').forEach(t=>t.classList.remove('on'));event?.target?.classList?.add('on');render();}
function setF(f){filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('on',(f==='T'&&b.textContent.startsWith('T'))||(f!=='T'&&b.textContent.includes({S:'Semis',I:'IA',C:'Cloud',N:'Infra',R:'Rob',F:'Fin'}[f]||'~'))));render();}

// ── Carga ─────────────────────────────────────────────────
const sl=ms=>new Promise(r=>setTimeout(r,ms));
function setL(p,t){document.getElementById('lb').style.width=Math.max(0,p)+'%';document.getElementById('lt').textContent=p<0?'':t;}
function showW(m){const e=document.getElementById('bw');e.style.display='block';e.textContent=m;}
function showE(m){const e=document.getElementById('be');e.style.display='block';e.textContent=m;}

async function loadData(){
  document.getElementById('bw').style.display='none';
  document.getElementById('be').style.display='none';
  setL(3,'Conectando con Yahoo Finance...');

  let done=0,errors=0;
  const BATCH=5; // 5 en paralelo

  for(let i=0;i<STOCKS.length;i+=BATCH){
    const batch=STOCKS.slice(i,i+BATCH);
    await Promise.all(batch.map(async x=>{
      const d=await fetchStock(x.t);
      if(Object.keys(d).length>0){
        data[x.t]={...(data[x.t]||{}),...d};
      } else {errors++;}
      done++;
      setL(Math.round(done/STOCKS.length*100),`Cargando ${done}/${STOCKS.length}...`);
    }));
    render();
    if(i+BATCH<STOCKS.length) await sl(300);
  }

  if(errors===STOCKS.length){
    showE('❌ No se pudo conectar con Yahoo Finance. Comprueba tu conexión y pulsa ↻ Actualizar.');
  } else if(errors>5){
    showW(`⚠️ ${errors} acciones no cargaron. Pulsa ↻ Actualizar para reintentar.`);
  }

  setL(100,''); await sl(400); setL(-1,'');
  document.getElementById('upd').textContent=
    `Actualizado: ${new Date().toLocaleTimeString('es-ES')} · Caché: precios 20min · histórico 6h`;
}

async function refreshData(){cAll();data={};render();await loadData();}

// ── Excel ─────────────────────────────────────────────────
function exportExcel(){
  const rows=[['#','Ticker','Empresa','Sector','Precio $','Día %','Semana %','Mes %','YTD %','1 Año %','Score','Estado']];
  [...STOCKS].map(x=>{const d=data[x.t]||{};return{...x,...d,sc:score(d)};})
    .sort((a,b)=>b.sc-a.sc)
    .forEach((r,i)=>rows.push([i+1,r.t,r.n,SN[r.s],
      r.price!=null?+r.price.toFixed(2):'',r.d!=null?+r.d.toFixed(2):'',
      r.w!=null?+r.w.toFixed(2):'',r.m!=null?+r.m.toFixed(2):'',
      r.ytd!=null?+r.ytd.toFixed(2):'',r.yr!=null?+r.yr.toFixed(2):'',
      r.sc,emj(r.sc)]));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:7},{wch:22},{wch:8},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:8},{wch:5}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Los 40 Principales');
  XLSX.writeFile(wb,`Los40_${new Date().toISOString().slice(0,10)}.xlsx`);
}
