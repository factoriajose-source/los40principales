<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Los 40 Principales 🔥</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root{--bg:#0a0e1a;--sf:#111827;--sf2:#1a2235;--bd:#1e293b;--tx:#e2e8f0;--mu:#64748b;--gr:#22c55e;--rd:#ef4444;--go:#f0c040;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;}

    /* HEADER */
    .hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .hdr-title{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;}
    .hdr-title span{color:var(--go);}
    .hdr-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--go);margin-top:2px;opacity:.8;}
    .hdr-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mu);margin-top:2px;}
    .hdr-btns{display:flex;gap:8px;}
    .btn{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:7px 13px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s;}
    .btn:hover{background:var(--bd);}
    .btn-go{background:var(--go);color:#000;border-color:var(--go);font-weight:700;}
    .btn-go:hover{background:#d4a800;}

    /* API BAR */
    .apibar{background:#0d1424;border-bottom:1px solid #f0c04033;padding:8px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .api-lbl{font-size:12px;color:var(--mu);white-space:nowrap;font-family:'JetBrains Mono',monospace;}
    .api-inp{flex:1;min-width:200px;max-width:400px;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:5px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12px;}
    .api-inp:focus{outline:none;border-color:var(--go);}
    .api-st{font-size:11px;font-family:'JetBrains Mono',monospace;}
    .api-st.ok{color:var(--gr);} .api-st.err{color:var(--rd);}
    .api-help{font-size:11px;color:var(--mu);}
    .api-help a{color:var(--go);}

    /* STATS */
    .stats{background:var(--sf);border-bottom:1px solid var(--bd);padding:9px 22px;display:flex;gap:22px;flex-wrap:wrap;}
    .stat{display:flex;align-items:center;gap:6px;font-size:13px;}
    .slb{color:var(--mu);} .svl{font-weight:600;font-family:'JetBrains Mono',monospace;}
    .cg{color:var(--gr);} .cr{color:var(--rd);} .cy{color:var(--go);}

    /* FILTERS */
    .filt{padding:9px 22px;display:flex;gap:7px;flex-wrap:wrap;}
    .fb{background:transparent;border:1px solid var(--bd);color:var(--mu);padding:4px 11px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .15s;}
    .fb:hover,.fb.on{background:var(--go);color:#000;border-color:var(--go);font-weight:600;}

    /* LOADING */
    .lw{background:var(--bd);height:3px;}
    .lb{height:100%;background:linear-gradient(90deg,var(--go),var(--gr));width:0%;transition:width .3s;}
    .lt{text-align:center;padding:5px;font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace;min-height:19px;}

    /* BANNERS */
    .ban{margin:10px 22px;padding:9px 13px;border-radius:6px;font-size:13px;display:none;}
    .bw{background:#22c55e15;border:1px solid var(--gr);color:var(--gr);}
    .be{background:#ef444415;border:1px solid var(--rd);color:var(--rd);}

    /* TABLE */
    .tw{overflow-x:auto;padding:0 22px 30px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{text-align:left;padding:9px 8px;font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none;white-space:nowrap;}
    thead th:hover{color:var(--tx);}  thead th.on{color:var(--go);}
    tbody tr{border-bottom:1px solid #1e293b33;transition:background .1s;}
    tbody tr:hover{background:var(--sf);}
    tbody tr.ex{background:#f0c04008;}  tbody tr.ex:hover{background:#f0c04015;}
    td{padding:9px 8px;vertical-align:middle;white-space:nowrap;}
    .rk{font-family:'JetBrains Mono',monospace;color:var(--mu);font-size:11px;}
    .tk{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;}
    .tk.gl{text-shadow:0 0 10px var(--go);color:var(--go);}
    .cn{color:var(--mu);font-size:12px;margin-top:1px;}
    .bg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;border:1px solid;}
    .ch{font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;}
    .pr{font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;}
    .pos{color:var(--gr);} .neg{color:var(--rd);} .neu{color:var(--mu);}
    .scw{display:flex;align-items:center;gap:7px;min-width:110px;}
    .scb{flex:1;height:6px;background:var(--bd);border-radius:3px;overflow:hidden;}
    .scf{height:100%;border-radius:3px;}
    .scn{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;min-width:22px;text-align:right;}
    .sk{display:inline-block;height:12px;border-radius:4px;vertical-align:middle;background:linear-gradient(90deg,var(--sf2) 25%,var(--bd) 50%,var(--sf2) 75%);background-size:200% 100%;animation:sh 1.4s infinite;}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .sS{color:#a78bfa;border-color:#a78bfa55;background:#a78bfa11;}
    .sI{color:#38bdf8;border-color:#38bdf855;background:#38bdf811;}
    .sC{color:#34d399;border-color:#34d39955;background:#34d39911;}
    .sN{color:#fb923c;border-color:#fb923c55;background:#fb923c11;}
    .sR{color:#e879f9;border-color:#e879f955;background:#e879f911;}
    .sF{color:#fbbf24;border-color:#fbbf2455;background:#fbbf2411;}
    @media(max-width:900px){.hm{display:none;}}
    @media(max-width:600px){.hdr,.apibar,.stats,.filt,.tw{padding-left:13px;padding-right:13px;}}
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="hdr-title">🔥 <span>Los 40 Principales</span> — Acciones USA</div>
    <div class="hdr-sub">📋 Lista revisada: 01/07/2026</div>
    <div class="hdr-meta" id="upd">Conectando...</div>
  </div>
  <div class="hdr-btns">
    <button class="btn" onclick="refreshData()">↻ Actualizar</button>
    <button class="btn btn-go" onclick="exportExcel()">↓ Excel</button>
  </div>
</div>

<!-- API KEY BAR (siempre visible) -->
<div class="apibar">
  <span class="api-lbl">🔑 API Key:</span>
  <input class="api-inp" id="kInp" type="text" placeholder="Pega tu clave de twelvedata.com">
  <button class="btn btn-go" onclick="saveKey()" style="padding:5px 13px;font-size:12px;">Guardar</button>
  <button class="btn" onclick="testKey()" style="padding:5px 13px;font-size:12px;" title="Prueba si la clave funciona">🔍 Probar</button>
  <span class="api-st" id="kSt"></span>
  <span class="api-help hm">Sin clave gratis → <a href="https://twelvedata.com/account/api-keys" target="_blank">twelvedata.com → API keys → View</a></span>
</div>

<!-- STATS -->
<div class="stats" id="stats"><div class="stat"><span class="slb">Esperando datos...</span></div></div>

<!-- FILTROS -->
<div class="filt">
  <button class="fb on" onclick="setF('T')">Todos (40)</button>
  <button class="fb" onclick="setF('S')">💜 Semiconductores</button>
  <button class="fb" onclick="setF('I')">🔵 IA & Datos</button>
  <button class="fb" onclick="setF('C')">🟢 Cloud & Ciber.</button>
  <button class="fb" onclick="setF('N')">🟠 Infraestructura</button>
  <button class="fb" onclick="setF('R')">🟣 Robótica</button>
  <button class="fb" onclick="setF('F')">🟡 Fintech</button>
</div>

<!-- LOADING -->
<div class="lw"><div class="lb" id="lb"></div></div>
<div class="lt" id="lt"></div>
<div class="ban bw" id="bw"></div>
<div class="ban be" id="be"></div>

<!-- TABLE -->
<div class="tw">
  <table>
    <thead><tr>
      <th style="width:26px">#</th>
      <th onclick="srt('t')">Ticker ↕</th>
      <th>Empresa</th>
      <th class="hm">Sector</th>
      <th onclick="srt('price')" style="text-align:right">Precio ↕</th>
      <th onclick="srt('d')"   style="text-align:right">Día ↕</th>
      <th onclick="srt('w')"   style="text-align:right" class="hm">Semana ↕</th>
      <th onclick="srt('m')"   style="text-align:right" class="hm">Mes ↕</th>
      <th onclick="srt('ytd')" style="text-align:right">YTD ↕</th>
      <th onclick="srt('yr')"  style="text-align:right" class="hm">1 Año ↕</th>
      <th onclick="srt('sc')" class="on">💥 Score ↕</th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>
</div>

<script>
// ════════════════════════════════════════════════════════════
// LOS 40 PRINCIPALES — José Ángel López Pérez
// v5 — Twelve Data API (gratis, sin proxies, fiable)
// ════════════════════════════════════════════════════════════

const STOCKS = [
  // SEMICONDUCTORES (11)
  {t:'NVDA',n:'Nvidia',              s:'S'},{t:'AMD', n:'AMD',               s:'S'},
  {t:'AVGO',n:'Broadcom',            s:'S'},{t:'MU',  n:'Micron Technology',  s:'S'},
  {t:'SNDK',n:'SanDisk',             s:'S'},{t:'TSM', n:'TSMC',               s:'S'},
  {t:'ARM', n:'Arm Holdings',        s:'S'},{t:'AMAT',n:'Applied Materials',  s:'S'},
  {t:'LRCX',n:'Lam Research',        s:'S'},{t:'KLAC',n:'KLA Corp',           s:'S'},
  {t:'MRVL',n:'Marvell Technology',  s:'S'},
  // IA & DATOS (8)
  {t:'MSFT',n:'Microsoft',           s:'I'},{t:'GOOGL',n:'Alphabet',          s:'I'},
  {t:'META',n:'Meta',                s:'I'},{t:'ORCL', n:'Oracle',             s:'I'},
  {t:'PLTR',n:'Palantir',            s:'I'},{t:'SNOW', n:'Snowflake',          s:'I'},
  {t:'DDOG',n:'Datadog',             s:'I'},{t:'NOW',  n:'ServiceNow',         s:'I'},
  // CLOUD & CIBERSEGURIDAD (6)
  {t:'AMZN',n:'Amazon',              s:'C'},{t:'CRWD',n:'CrowdStrike',        s:'C'},
  {t:'NET', n:'Cloudflare',          s:'C'},{t:'ZS',  n:'Zscaler',            s:'C'},
  {t:'PANW',n:'Palo Alto Networks',  s:'C'},{t:'ALAB',n:'Astera Labs',        s:'C'},
  // INFRAESTRUCTURA IA (5)
  {t:'SMCI',n:'Super Micro Computer',s:'N'},{t:'WDC', n:'Western Digital',    s:'N'},
  {t:'STX', n:'Seagate',             s:'N'},{t:'PURE',n:'Pure Storage',       s:'N'},
  {t:'DELL',n:'Dell Technologies',   s:'N'},
  // ROBÓTICA & ESPACIO (5)
  {t:'TSLA',n:'Tesla',               s:'R'},{t:'RKLB',n:'Rocket Lab',         s:'R'},
  {t:'AXON',n:'Axon Enterprise',     s:'R'},{t:'PATH',n:'UiPath',             s:'R'},
  {t:'IONQ',n:'IonQ',                s:'R'},
  // FINTECH & OTROS (5)
  {t:'COIN',n:'Coinbase',            s:'F'},{t:'MELI',n:'MercadoLibre',       s:'F'},
  {t:'SHOP',n:'Shopify',             s:'F'},{t:'FTNT',n:'Fortinet',           s:'F'},
  {t:'UBER',n:'Uber Technologies',   s:'F'},
];

const SNAMES = {S:'Semis',I:'IA',C:'Cloud',N:'Infra',R:'Robótica',F:'Fintech'};

// ── API Key ──────────────────────────────────────────────────
const KS = 'td40k_v1';
let apiKey = localStorage.getItem(KS) || '';

function saveKey() {
  const v = (document.getElementById('kInp').value || '').trim();
  if(!v){ kSt('err','⚠ Introduce la clave'); return; }
  apiKey = v;
  localStorage.setItem(KS, v);
  kSt('ok','✓ Guardada');
  cClear();
  data = {};
  render();
  loadData();
}
function kSt(type, msg) {
  const el = document.getElementById('kSt');
  el.textContent = msg; el.className = 'api-st ' + type;
  if(type==='ok') setTimeout(()=>{ el.textContent='✓'; }, 3000);
}

// ── Cache ─────────────────────────────────────────────────────
function cG(k)      { try{ return JSON.parse(localStorage.getItem(k))?.d??null; }catch{return null;} }
function cS(k,d,ttl){ try{ localStorage.setItem(k,JSON.stringify({ts:Date.now(),ttl,d})); }catch{} }
function cOk(k)     { try{ const r=JSON.parse(localStorage.getItem(k)); return r&&(Date.now()-r.ts)<(r.ttl||3600e3); }catch{return false;} }
function cClear()   { localStorage.removeItem('td40q'); localStorage.removeItem('td40h'); }

// ── Twelve Data: cotizaciones batch (1 sola llamada) ─────────
async function fetchQ() {
  if(cOk('td40q')) return cG('td40q')||{};
  const sym = STOCKS.map(x=>x.t).join(',');
  try {
    const r = await fetch(`https://api.twelvedata.com/quote?symbol=${sym}&apikey=${apiKey}`);
    const j = await r.json();
    // Error de clave
    if(j.code===401||j.code===403||(j.status==='error'&&j.message?.toLowerCase().includes('api'))) {
      showE('❌ API key incorrecta o sin plan activo. Regístrate gratis en twelvedata.com/register');
      return cG('td40q')||{};
    }
    const res = {};
    STOCKS.forEach(x => {
      const q = STOCKS.length===1 ? j : j[x.t];
      if(!q||q.status==='error') return;
      res[x.t] = {
        price: parseFloat(q.close)||null,
        d:     parseFloat(q.percent_change)||null,
        vol:   parseInt(q.volume)||null,
        avgVol:parseInt(q.average_volume)||null,
      };
    });
    if(Object.keys(res).length===0) return cG('td40q')||{};
    cS('td40q', res, 15*60*1000);
    return res;
  } catch(e) {
    showW('⚠️ Sin conexión — usando caché.');
    return cG('td40q')||{};
  }
}

// ── Twelve Data: histórico batch (2 llamadas de 20 acciones) ─
async function fetchH() {
  if(cOk('td40h')) return cG('td40h')||{};
  const all = {};
  const BSIZE = 20;
  const thisYear = String(new Date().getFullYear());

  for(let i=0; i<STOCKS.length; i+=BSIZE) {
    const batch = STOCKS.slice(i, i+BSIZE);
    const sym   = batch.map(x=>x.t).join(',');
    try {
      const r = await fetch(`https://api.twelvedata.com/time_series?symbol=${sym}&interval=1day&outputsize=260&apikey=${apiKey}`);
      const j = await r.json();

      batch.forEach(x => {
        const sd = batch.length===1 ? j : j[x.t];
        if(!sd||sd.status==='error'||!sd.values) return;
        const v   = sd.values;           // v[0]=hoy, v[N]=más antiguo
        if(v.length<10) return;
        const cur = parseFloat(v[0].close);
        const pct = (old) => old ? (cur-old)/old*100 : null;
        const at  = (i)   => parseFloat(v[Math.min(i,v.length-1)].close);
        const ytdV = v.filter(x=>x.datetime.startsWith(thisYear));
        const ytdP = ytdV.length ? parseFloat(ytdV[ytdV.length-1].close) : null;
        all[x.t]  = { w:pct(at(5)), m:pct(at(21)), ytd:pct(ytdP), yr:pct(at(252)) };
      });

      Object.keys(all).forEach(t => {
        data[t] = {...(data[t]||{}), ...all[t]};
      });
      render();
      if(i+BSIZE < STOCKS.length) await sl(1200); // respetar rate limit
    } catch(e) { continue; }
  }
  if(Object.keys(all).length>0) cS('td40h', all, 4*60*60*1000);
  return all;
}

// ── Score ─────────────────────────────────────────────────────
function score(st) {
  const n=(v,lo,hi)=>v==null?0:Math.max(0,Math.min(100,(v-lo)/(hi-lo)*100));
  return Math.round(
    n(st.d,  -5, 12)*0.20 + n(st.w,-10, 25)*0.20 + n(st.m,-20, 60)*0.20 +
    n(st.ytd,-30,200)*0.20 + n(st.yr,-30,300)*0.15 +
    n(st.vol&&st.avgVol?st.vol/st.avgVol:1,0.5,3)*0.05
  );
}
const emj = sc=>sc>=85?'🔥':sc>=70?'🚀':sc>=55?'📈':sc>=40?'➡️':'❄️';
const scl = sc=>sc>=85?'#f0c040':sc>=70?'#22c55e':sc>=55?'#38bdf8':sc>=40?'#94a3b8':'#475569';

// ── Formato ───────────────────────────────────────────────────
const f2 = v=>v!=null?v.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const fp = v=>v!=null?(v>=0?'+':'')+f2(v)+'%':'—';
const fx = v=>v!=null?'$'+v.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const cc = v=>v==null?'neu':v>0?'pos':'neg';
const sk = w=>`<span class="sk" style="width:${w}px">&nbsp;</span>`;

// ── Estado ────────────────────────────────────────────────────
let data={}, col='sc', dir=-1, filt='T';

// ── Render ────────────────────────────────────────────────────
function render() {
  let rows = STOCKS.map(x=>{const d=data[x.t]||{}; return{...x,...d,sc:score(d)};});
  if(filt!=='T') rows=rows.filter(r=>r.s===filt);
  rows.sort((a,b)=>col==='t'?a.t<b.t?-dir:dir:((a[col]??-9999)-(b[col]??-9999))*dir);

  document.getElementById('tb').innerHTML = rows.map((r,i)=>{
    const cl=scl(r.sc);
    return `<tr class="${r.sc>=70?'ex':''}">
      <td class="rk">${i+1}</td>
      <td><div class="tk ${r.sc>=85?'gl':''}">${r.t}</div></td>
      <td><div class="cn">${r.n}</div></td>
      <td class="hm"><span class="bg s${r.s}">${SNAMES[r.s]}</span></td>
      <td class="pr">${r.price!=null?fx(r.price):sk(58)}</td>
      <td class="ch ${cc(r.d)}">${r.d!=null?fp(r.d):sk(46)}</td>
      <td class="ch ${cc(r.w)} hm">${r.w!=null?fp(r.w):sk(46)}</td>
      <td class="ch ${cc(r.m)} hm">${r.m!=null?fp(r.m):sk(46)}</td>
      <td class="ch ${cc(r.ytd)}">${r.ytd!=null?fp(r.ytd):sk(46)}</td>
      <td class="ch ${cc(r.yr)} hm">${r.yr!=null?fp(r.yr):sk(46)}</td>
      <td><div class="scw">
        <span style="font-size:13px">${emj(r.sc)}</span>
        <div class="scb"><div class="scf" style="width:${r.sc}%;background:${cl}"></div></div>
        <span class="scn" style="color:${cl}">${r.sc}</span>
      </div></td>
    </tr>`;
  }).join('');

  const hp = rows.filter(r=>r.price!=null);
  const top = [...rows].sort((a,b)=>(b.ytd??-999)-(a.ytd??-999))[0];
  document.getElementById('stats').innerHTML=`
    <div class="stat"><span class="slb">Hoy:</span><span class="svl cg">▲ ${hp.filter(r=>(r.d??0)>0).length} subiendo</span></div>
    <div class="stat"><span class="svl cr">▼ ${hp.filter(r=>(r.d??0)<0).length} bajando</span></div>
    <div class="stat"><span class="slb">💥 Explosivas:</span><span class="svl cy">${rows.filter(r=>r.sc>=70).length}</span></div>
    ${top?.ytd!=null?`<div class="stat hm"><span class="slb">👑 Mejor YTD:</span><span class="svl cg">${top.t} ${fp(top.ytd)}</span></div>`:''}
  `;
}

function srt(c){dir=col===c?dir*-1:-1;col=c;document.querySelectorAll('thead th').forEach(th=>th.classList.remove('on'));event?.target?.classList?.add('on');render();}
function setF(f){filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('on',b.textContent.includes({T:'Todos',S:'Semis',I:'IA',C:'Cloud',N:'Infra',R:'Rob',F:'Fin'}[f])||f==='T'&&b.textContent.startsWith('T')));render();}

// ── Carga ─────────────────────────────────────────────────────
function setL(p,t){document.getElementById('lb').style.width=Math.max(0,p)+'%';document.getElementById('lt').textContent=p<0?'':t;}
function showW(m){const e=document.getElementById('bw');e.style.display='block';e.textContent=m;}
function showE(m){const e=document.getElementById('be');e.style.display='block';e.textContent=m;}
const sl = ms=>new Promise(r=>setTimeout(r,ms));

async function loadData() {
  if(!apiKey){ showE('⬆ Introduce tu API key de Twelve Data y pulsa Guardar'); return; }
  document.getElementById('bw').style.display='none';
  document.getElementById('be').style.display='none';
  setL(5,'Conectando con Twelve Data...');

  // 1. Cotizaciones (precio + día% — 1 sola llamada)
  const q = await fetchQ();
  const nq = Object.keys(q).length;
  if(nq===0){ setL(-1,''); return; }
  Object.assign(data, q);
  render();
  setL(30,`Precios OK (${nq} acciones) — cargando histórico...`);

  // 2. Histórico (2 llamadas batch de 20 acciones c/u)
  await fetchH();

  setL(100,''); await sl(400); setL(-1,'');
  document.getElementById('upd').textContent =
    `Actualizado: ${new Date().toLocaleTimeString('es-ES')} · Precios: caché 15min · Histórico: caché 4h`;
}

async function refreshData(){ cClear(); data={}; render(); await loadData(); }

// ── Excel ─────────────────────────────────────────────────────
function exportExcel(){
  const rows=[['#','Ticker','Empresa','Sector','Precio $','Día %','Semana %','Mes %','YTD %','1 Año %','Score','Estado']];
  [...STOCKS].map(x=>{const d=data[x.t]||{};return{...x,...d,sc:score(d)};})
    .sort((a,b)=>b.sc-a.sc)
    .forEach((r,i)=>rows.push([i+1,r.t,r.n,SNAMES[r.s],
      r.price!=null?+r.price.toFixed(2):'', r.d!=null?+r.d.toFixed(2):'',
      r.w!=null?+r.w.toFixed(2):'',         r.m!=null?+r.m.toFixed(2):'',
      r.ytd!=null?+r.ytd.toFixed(2):'',     r.yr!=null?+r.yr.toFixed(2):'',
      r.sc, emj(r.sc)]));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:7},{wch:22},{wch:9},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:8},{wch:5}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Los 40 Principales');
  XLSX.writeFile(wb,`Los40_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── Test de clave (prueba con 1 acción y muestra respuesta real) ─
async function testKey() {
  const v = (document.getElementById('kInp').value || '').trim();
  if(!v){ kSt('err','⚠ Introduce la clave primero'); return; }
  kSt('ok','🔍 Probando...');
  document.getElementById('be').style.display='none';
  document.getElementById('bw').style.display='none';
  try {
    const r = await fetch(`https://api.twelvedata.com/quote?symbol=NVDA&apikey=${v}`);
    const j = await r.json();
    if(j.status==='error'||j.code) {
      // Mostrar el error EXACTO de Twelve Data
      showE(`❌ Twelve Data dice: [${j.code}] ${j.message}`);
      kSt('err','✗ Clave inválida');
    } else if(j.close || j.price) {
      // Funciona!
      kSt('ok',`✓ Clave OK — NVDA: $${parseFloat(j.close||j.price).toFixed(2)}`);
      apiKey = v;
      localStorage.setItem(KS, v);
      showW('✅ Clave correcta. Ahora pulsa Guardar para cargar las 40 acciones.');
      document.getElementById('bw').style.display='block';
    } else {
      showE(`⚠️ Respuesta inesperada: ${JSON.stringify(j).slice(0,200)}`);
      kSt('err','? Respuesta rara');
    }
  } catch(e) {
    showE(`❌ Error de red: ${e.message}`);
    kSt('err','✗ Error');
  }
}
